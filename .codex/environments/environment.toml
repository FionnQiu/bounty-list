     FROM bounties b
     WHERE ${where.join(' AND ')}`,
    filterParams
  );
  console.log('count ok', JSON.stringify(totalRows));

  const categories = await query(
    'SELECT id, name FROM bounty_categories ORDER BY sort_order ASC, id ASC'
  );
  console.log('categories ok', categories.length);
} catch (error) {
  console.error('QUERY_ERROR');
  console.error(error);
  process.exit(1);
