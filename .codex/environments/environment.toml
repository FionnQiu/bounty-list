const orderBy = 'b.created_at DESC';

try {
  const rows = await query(
    `SELECT b.*, c.name AS category_name, u.nickname AS publisher_nickname, u.avatar_url AS publisher_avatar_url
     FROM bounties b
     JOIN bounty_categories c ON c.id = b.category_id
     JOIN users u ON u.id = b.publisher_id
     WHERE ${where.join(' AND ')}
     ORDER BY ${orderBy}
     LIMIT ${pageSize} OFFSET ${offset}`,
    filterParams
  );
  console.log('rows ok', rows.length);

  const totalRows = await query(
